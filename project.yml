name: AdBlocker
options:
  bundleIdPrefix: com.hau
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""

targets:
  AdBlocker:
    type: application
    platform: iOS
    sources:
      - path: AdBlocker
      - path: Shared
    resources:
      - path: AdBlocker/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hau.adblocker
        INFOPLIST_FILE: AdBlocker/Info.plist
        CODE_SIGN_ENTITLEMENTS: AdBlocker/AdBlocker.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ContentBlocker
        embed: embed-and-sign
    scheme:
      testTargets:
        - AdBlockerTests

  ContentBlocker:
    type: app-extension
    platform: iOS
    sources:
      - path: ContentBlocker
        excludes:
          - Resources
      - path: Shared
    resources:
      - path: ContentBlocker/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hau.adblocker.ContentBlocker
        INFOPLIST_FILE: ContentBlocker/Info.plist
        CODE_SIGN_ENTITLEMENTS: ContentBlocker/ContentBlocker.entitlements
        GENERATE_INFOPLIST_FILE: false

  AdBlockerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AdBlockerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hau.adblocker.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AdBlocker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AdBlocker"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: AdBlocker
